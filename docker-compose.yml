services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:///./data/youtubeplaylist.db
      DEFAULT_PLAYLIST_ID: ${DEFAULT_PLAYLIST_ID:-}
      PORT: 8080
    volumes:
      - app-data:/app/backend/data

volumes:
  app-data:
